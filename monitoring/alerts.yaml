groups:
- name: ai_homework_tutor_alerts
  rules:
  - alert: HighErrorRate
    expr: rate(app_errors_total[5m]) > 0.05
    for: 1m
    labels:
      severity: critical
    annotations:
      summary: High error rate in AI Homework Tutor
  - alert: HighLatency
    expr: histogram_quantile(0.95, rate(homework_latency_seconds_bucket[5m])) > 0.5
    for: 1m
    labels:
      severity: warning
    annotations:
      summary: 95th percentile latency is above 500ms
